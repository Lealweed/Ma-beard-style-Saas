# fly.toml configuration file for Fly.io
# Run 'fly launch' to initialize or 'fly deploy' to update

app = "ma-beard-style-saas" # Substitua pelo nome do seu app no Fly.io
primary_region = "gru" # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512
